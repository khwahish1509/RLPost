# Phase 3 reference config — schema mirrors prime-rl's training TOML.
# First real run: Qwen3-0.6B, tiny env, 50 steps, Colab T4.

model = "Qwen/Qwen3-0.6B"
max_steps = 50
batch_size = 8
rollouts_per_example = 8
learning_rate = 1e-5
checkpoint_every = 10

[lora]
r = 16
alpha = 32

[[env]]
id = "primeintellect/alphabet-sort"
