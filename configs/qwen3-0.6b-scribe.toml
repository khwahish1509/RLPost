# S2: train a small Scribe on Lift, using the multi-turn served-rollout path.
# Bring-up uses the FAKE Player: reward becomes "did the notebook carry the
# figures forward" — a clean, zero-cost curriculum for note-taking mechanics.
# Graduate to a real API Player (see [[env]] args) once the curve moves.

model = "Qwen/Qwen3-0.6B"
max_steps = 100
batch_size = 4           # streams per step — each episode is 7 full turns
rollouts_per_example = 4
learning_rate = 1e-4
checkpoint_every = 10
seed = 0
max_new_tokens = 512     # notebooks are longer than boxed math answers
temperature = 1.0
micro_batch_size = 1     # turn-pair contexts are long; keep the loss pass small
enable_thinking = false
# Lift starts near 0 for an untrained scribe — that's the point, not a defect;
# only abort if the task is somehow already solved.
trainability_window = [-1.0, 0.8]

[lora]
r = 16
alpha = 32

[[env]]
id = "scribe-stream"
args = { player_model = "fake" }
